name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [ main, feature/responsive-modal-redesign ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: frontend/dist

      - name: Bundle Size Report
        working-directory: frontend
        run: |
          echo "=== Bundle Size Report ==="
          du -sh dist/assets/*.js 2>/dev/null | sort -rh | head -20 || true
          du -sh dist/assets/*.css 2>/dev/null | sort -rh | head -5 || true
          TOTAL_JS=$(du -sk dist/assets/*.js 2>/dev/null | awk '{sum+=$1} END {print sum}')
          echo "Total JS: ${TOTAL_JS} KB"
          if [ "$TOTAL_JS" -gt 2048 ]; then
            echo "⚠️  WARNING: JS bundle exceeds 2MB (${TOTAL_JS} KB). Consider code splitting."
          else
            echo "✅ Bundle size OK (${TOTAL_JS} KB)"
          fi


