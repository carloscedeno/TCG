<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/jpeg" href="/favicon.jpg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#373266" />
  <link rel="apple-touch-icon" href="/favicon.jpg" />
  <!-- SEO Meta Tags (Parametrizados via Vite/Cloudflare) -->
  <title>%VITE_SEO_TITLE%</title>
  <meta name="description" content="%VITE_SEO_DESCRIPTION%" />
  <meta name="keywords" content="%VITE_SEO_KEYWORDS%" />
  <meta name="author" content="Geekorium" />
  <meta name="robots" content="%VITE_ROBOTS%" />
  <link rel="canonical" href="%VITE_APP_URL%" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="%VITE_APP_URL%" />
  <meta property="og:title" content="%VITE_SEO_TITLE%" />
  <meta property="og:description" content="%VITE_SEO_DESCRIPTION%" />
  <meta property="og:image" content="%VITE_SEO_IMAGE%" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="%VITE_APP_URL%" />
  <meta property="twitter:title" content="%VITE_SEO_TITLE%" />
  <meta property="twitter:description" content="%VITE_SEO_DESCRIPTION%" />
  <meta property="twitter:image" content="%VITE_SEO_IMAGE%" />

  <!-- Mana Font for MTG Symbols -->
  <link href="https://cdn.jsdelivr.net/npm/mana-font@latest/css/mana.css" rel="stylesheet" type="text/css" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
