<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geekorium - En Mantenimiento</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-color: #050505;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 209, 255, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(0, 255, 163, 0.08), transparent 25%);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            text-align: center;
            overflow: hidden;
        }

        .container {
            max-width: 600px;
            padding: 40px;
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 10;
        }

        .glow-line {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00D1FF, #00FFA3, transparent);
            border-radius: 100%;
            box-shadow: 0 0 20px #00D1FF;
        }

        .icon-container {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, rgba(0, 209, 255, 0.1), rgba(0, 255, 163, 0.1));
            border: 1px solid rgba(0, 209, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 2s infinite;
        }

        .icon-container svg {
            width: 40px;
            height: 40px;
            color: #00D1FF;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            margin: 0 0 16px;
            letter-spacing: -0.05em;
            background: linear-gradient(to right, #ffffff, #a0a0a0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #888888;
            margin: 0 0 32px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 9999px;
            color: #FFD700;
            font-size: 0.875rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #FFD700;
            border-radius: 50%;
            box-shadow: 0 0 10px #FFD700;
            animation: blink 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 209, 255, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(0, 209, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 209, 255, 0); }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 1;
            pointer-events: none;
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <div class="grid-overlay"></div>
    <div class="container">
        <div class="glow-line"></div>
        
        <img src="https://www.geekorium.shop/branding/Logo.png" alt="Geekorium Logo" style="width: 240px; height: auto; margin: 0 auto 24px; display: block;" />

        <h1>Forjando Mejoras</h1>
        <p>Estamos realizando un mantenimiento programado para actualizar nuestros sistemas y ofrecerte una experiencia más rápida y estable. El portal volverá a estar en línea muy pronto.</p>
        
        <div class="status-badge">
            <div class="status-dot"></div>
            Sistemas en Mantenimiento
        </div>
    </div>
</body>
</html>
